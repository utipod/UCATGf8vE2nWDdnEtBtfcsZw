title = "افغانستان در نظم جدید جهانی به کدام سو میرود؟ گفتگو با علیرضا کمیلی و بهرام زاهدی"
description = "یکسال پیش در چنین روزهایی کمتر کسی باور میکرد که طالبان به این سادگی کابل را فتح کند. اما امروز یازده ماه از به قدرت رسیدن امارت اسلامی طالبان میگذرد و طالبان دیگر واقعیت انکار ناپذیر افغانستان دانسته میشود. درست است که تا این لحظه هنوز هیچ کشوری به صورت رسمی و قانونی امارت اسلامی را به رسمیت نشناخته ولی چین، روسیه، پاکستان، ایران، ازبکستان و حتی هند  در عمل  با ان طالبان رابطه برقرار کرده، در کابل سفارتهایشان را مستقر کرده‌اند و مشغول رایزنی برای فعالیتهای اقتصادی هستند. \n.\nدر سوی دیگر آمریکا و کشورهای اتحادیه اروپا بواسطه تحریمها و بلوکه کردن پول افغانستان سعی دارند بر این کشور فشار اقتصای بیاورند تا کمی از نفوذ خود بر افغانستان را حفظ کنند و نگذارند این کشور تماما به سمت شرق بچرخد. \n.\nامشب در جدال می‌پرسیم افغانستان در نظم جدید جهانی به کدام سمت و سو میرود؟ حکومت امارت اسلامی چه رابطه‌ای با همسایگان و قدرتهای منطقه‌ای برقرار کرده؟ در این یازده ماه رابطه با چین، روسیه، آسیای میانه، ایران، پاکستان، هند. و عربستان به کدام سو رفته؟ هر کدام از این کشورها در افغانستان دنبال چه منافعی هستند و دولت جدید افغانستان از این کشورها چه میخواهد؟  بحث عبور یک کمربند یک جاده از افغانستان تا چه حد واقعی و ممکن است؟ خط لوله گاز تاپی در چه حد پیشرفت داشته؟ و در نهایت ایران باید از چه منظری به افغانستان نگاه کند و حافظ کدام منافع ملی در رابطه  با افغانستان باشد و آیا دولت رییسی تا این لحظه موفق شده سیاستی متعادل و متوازن در رابطه با افغانستان داشته باشد یا با تعلل زیاد عملا فرصت سوزی کرده؟\n.\nدو مهمان امشب یکی علیرضا کمیلی پژوهشگر جریانهای اسلامگراست که مدتی است در افغانستان  زندگی میکند و دیگری دکتر بهرام زاهدی کارشناس مسایل افغانستان است"
