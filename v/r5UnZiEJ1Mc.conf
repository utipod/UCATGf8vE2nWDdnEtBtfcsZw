title = "نظم جدید بازار جهانی نفت پس از جنگ اوکراین: گفتگو با سید احسان حسینی"
description = "با آغاز جنگ اوکراین و اعمال تحریم‌های غرب بر روسیه دو اتفاق مهم افتاد: اول گران شدن یکباره نفت بود و دیگری هم ورود روسیه به  بازار سیاه نفت، جایی که پیشتر فقط ایران در آن حضور داشت. در هفته‌های گذشته رسانه‌های غربگرا و روس‌هراس بارها اخباری منتشر کردند مبنی بر اینکه روسیه مشغول فروش نفت خود زیر قیمت به چین است و با این کار دارد سهم فروش نفت ایران را از چنگش می‌قاپد. این رسانه‌ها با انتشار مرتب این اخبار مدعی بودند روسیه به منافع ملی ایران ضرر زده و ایران برای فروش نفت خود چاره‌ای به احیای برجام و بازگشت به بازارهای رسمی نفت ندارد. امشب این ادعا را بررسی میکنیم و می‌پرسیم  اصلا بازار جهانی نفت بعد از  جنگ اوکراین و تحریم‌های روسیه به کدام سو میرود. مهمان امشب ما سید احسان حسینی خبرنکار حوزه نفت و گاز است که پیشتر در برنامه‌ای درباره ونزوئلا هم مهمان جدال بوده.\n\n\nاما  قبل از شروع : ابتدا میخواهیم برنامه را لایک کنید و اگر هنوز به عضویت کانال یوتیوب جدال درنیامده‌اید حتما همین لحظه این کار را بکنید. این برای شما هزینه‌ای ندارد اما به ما کمک بسیاری میکند.  و بعد:  جدال اصرار دارد از هیچ گروه و فرد و نهادی کمک مالی نپذیرد. و همینطور اصرار شدید دارد تا از هیچ کس تبلیغ نگیرد. حتی از انتشارات و کتابفروشی ها و نهادهای فرهنگی. چرا که معتقدیم هرگونه کمک مالی. حتی یک ریال و یک دلار باعث این میشود که رسانه وامدار این فرد یا ان فرد و این گروه یا ان گروه شود. ما میخواهیم مستقل بمانیم  تا از کسی نترسیم و سخن‌مان از ترس صاحبان قدرت و ثروت نلرزد و در گفتن چیزی که گمان میکنیم حقیقت دارد تردیدی نکنیم. ما میخواهیم شما مخاطبان عادی با کمترین مبالغ مشترک ما شوید و اجازه دهید ما این مسیر را برویم. اگر خارج از کشور هستید با مبلغ اندک پنج دلار در ماه مشترک ما در پتریون شوید. یا اگر دوست ندارید مشترک شوید به پی‌پل ما کمک کنید. و اگر ایران هستید با مبلغ پنجاه هزار تومن به شماره حساب زیر در بانک ملی اجازه دهید ما این راه را ادامه دهیم.\n\n\npatreon.com/jedaal\npaypal.me/jedaal\n\n\nحساب بانکی برای داخل کشور:\nبانک ملی بنام مجید علیزاده\n6037991815099597\n\nجدال را در شبکه‌های اجتماعی دنبال کنید\n\nجدال در کلاب‌هاوس: \nhttps://www.clubhouse.com/@jedaal\n\nجدال در تلگرام\nt.me/jedaal\n\nجدال در اینستاگرام\ninstagram.com/jedaal_tv\ninstagram.com/ali.alizadeh.insta\n\nجدال در توییتر\ntwitter.com/jedaal_tv\ntwitter.com/jedaaal\n\nجدال در آپارات\naparat.com/jedaal_tv\n\nایمیل جدال\njedaaltv@gmail.com"
